<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100均アプリ — 自分（開発者）なら100円以上でも払うものを作りました</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --primary: #2d5a27;
    --primary-dark: #16300f;
    --accent: #e8a020;
    --text: #1a1a18;
    --muted: #6b6b66;
    --border: #e0ddd6;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; padding-top: 52px; }

  /* Header */
  header {
    background: var(--primary);
    padding: 0 20px;
    display: flex; align-items: center; gap: 14px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
  }
  header h1 {
    color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.06em;
    border: 2px solid #fff;
    padding: 3px 14px; border-radius: 6px;
    white-space: nowrap; flex-shrink: 0;
  }
  header nav { margin-left: auto; flex-shrink: 0; }
  header nav a { color: #b8d9b2; font-size: 12px; text-decoration: none; white-space: nowrap; }
  header nav a:hover { color: #fff; }

  /* トップバー直下の小さな煽り文 */
  .sub-tagline {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--muted);
    padding: 8px 16px 8px 28px;
    background: var(--bg);
  }

  /* ── ファーストビュー（雑誌の表紙のようなインパクト） ── */
  .hero {
    min-height: calc(100dvh - 52px);
    background: radial-gradient(circle at 50% 0%, #3d7536, var(--primary) 55%, var(--primary-dark));
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    text-align: center;
    padding: 20px 20px 56px;
    position: relative;
    overflow: hidden;
  }
  /* スクリーンショット：1枚ずつ表示・先に配置 */
  .hero-carousel {
    position: relative;
    width: clamp(280px, 92vw, 380px);
    margin: 0 auto;
    z-index: 1;
    order: 1;
  }
  .hero-carousel-viewport {
    overflow: hidden;
    border-radius: 20px;
  }
  .hero-carousel-track {
    display: flex;
    touch-action: pan-y;
    cursor: grab;
  }
  .hero-carousel-track:active { cursor: grabbing; }
  .hero-screenshot {
    flex: 0 0 100%;
    width: 100%;
    aspect-ratio: 9/19.5;
    border-radius: 20px;
    background: linear-gradient(160deg, #1a1d24, #2d3748);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(36px, 9vw, 64px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    user-select: none;
    object-fit: cover;
  }
  .hero-carousel .arrow {
    position: absolute; top: 40%; transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; color: #fff;
    transition: background 0.15s; z-index: 10;
    user-select: none;
  }
  .hero-carousel .arrow:hover { background: rgba(0,0,0,0.7); }
  .hero-carousel .arrow.left  { left: 12px; }
  .hero-carousel .arrow.right { right: 12px; }
  /* 白い解説テキスト部分：スマホ画像に重ねて下に配置 */
  .hero-text-block {
    background: rgba(255,255,255,0.97);
    color: var(--text);
    border-radius: 14px;
    padding: 8px 16px 6px;
    width: clamp(280px, 92vw, 380px);
    position: relative;
    z-index: 2;
    margin-top: -100px;
    order: 2;
  }
  .hero-title {
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 2px;
  }
  .hero-title .line1 {
    display: block;
    text-align: left;
    font-size: clamp(12px, 3.5vw, 18px);
    color: var(--primary);
    margin-bottom: 1px;
  }
  .hero-title .line2 {
    display: block;
    font-size: clamp(16px, 4.5vw, 26px);
    color: var(--text);
  }
  .hero-catchbox {
    display: inline-block;
    background: var(--primary);
    border: none;
    border-radius: 5px;
    padding: 3px 8px;
    font-size: clamp(9px, 2.2vw, 12px);
    font-weight: 700;
    color: #fff;
    margin-bottom: 0;
  }
  .hero-ctas {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    width: clamp(280px, 92vw, 380px);
    order: 3;
    margin-top: 16px;
  }
  .hero-btn {
    flex: 1 1 160px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 15px; font-weight: 700;
    text-decoration: none;
    text-align: center;
    transition: transform 0.15s, opacity 0.15s;
  }
  .hero-btn:active { transform: scale(0.97); }
  .hero-btn.purchase { background: var(--accent); color: #fff; box-shadow: 0 6px 18px rgba(232,160,32,0.4); }
  .hero-btn.purchase:hover { opacity: 0.92; }
  .hero-btn.guest { background: rgba(255,255,255,0.08); color: #fff; border: 1.5px solid rgba(255,255,255,0.55); }
  .hero-btn.guest:hover { background: rgba(255,255,255,0.16); }

  .scroll-hint {
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    color: rgba(255,255,255,0.65); font-size: 11px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    animation: bounce 1.8s infinite;
  }
  .scroll-hint svg { width: 18px; height: 18px; }
  @keyframes bounce {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, 6px); }
  }

  /* ── 特徴セクション（スクロールで出現） ── */
  .features-section {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(56px, 10vw, 110px) 20px;
  }
  .features-section .section-label {
    text-align: center;
    font-size: clamp(22px, 6vw, 32px); font-weight: 900; color: var(--primary);
    letter-spacing: 0.02em; line-height: 1.4; margin-bottom: 40px;
  }
  .feature-item {
    display: flex; align-items: center; gap: 18px;
    padding: 26px 0;
    border-bottom: 0.5px solid var(--border);
    opacity: 0; transform: translateY(28px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .feature-item:last-child { border-bottom: none; }
  .feature-item.visible { opacity: 1; transform: translateY(0); }
  .feature-item .mark {
    flex-shrink: 0;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
  }
  .feature-item .feature-text {
    font-size: clamp(15px, 3.6vw, 18px);
    font-weight: 700;
    line-height: 1.6;
  }

  /* ── 詳細・購入リンクCTA ── */
  .detail-cta {
    text-align: center;
    padding: 0 20px clamp(70px, 12vw, 120px);
  }
  .detail-cta .price-line {
    font-size: 26px; font-weight: 900; margin-bottom: 6px;
  }
  .detail-cta .price-line span { font-size: 13px; color: var(--muted); font-weight: 400; }
  .detail-cta .cta-btn {
    display: inline-block; margin-top: 18px;
    background: var(--primary); color: #fff;
    padding: 16px 40px; border-radius: 10px;
    font-size: 15px; font-weight: 700; text-decoration: none;
  }
  .detail-cta .cta-btn:hover { background: #234a1f; }

  /* ── 2作目以降（追加アプリ） ── */
  .more-apps {
    max-width: 1100px; margin: 0 auto; padding: 0 24px 60px;
  }
  .more-apps .section-label {
    font-size: 11px; font-weight: 700; color: var(--primary);
    letter-spacing: 0.12em; margin-bottom: 16px;
  }
  .more-app-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    text-decoration: none; color: var(--text);
  }
  .more-app-card .icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: #c8dfc4; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .more-app-card .name { font-size: 15px; font-weight: 700; }
  .more-app-card .stars { color: var(--accent); font-size: 12px; }

  .placeholder-note {
    margin-top: 16px; padding: 32px 24px;
    border: 2px dashed var(--border); border-radius: var(--radius);
    text-align: center; color: var(--muted); font-size: 13px;
  }

  /* Footer */
  footer {
    background: var(--primary); color: #b8d9b2;
    text-align: center; padding: 20px; font-size: 12px;
  }
  footer a { color: #b8d9b2; margin: 0 10px; text-decoration: none; }
  footer a:hover { color: #fff; }
  footer .admin-link {
    color: rgba(184,217,178,0.35); font-size: 10px;
    border: none; background: none; cursor: pointer;
    font-family: inherit;
  }
  footer .admin-link:hover { color: rgba(184,217,178,0.7); }

  /* ── PC（広い画面）：ファーストビューを左右2分割でよりインパクトのある配置に ── */
  @media (min-width: 860px) {
    .hero { flex-direction: row; justify-content: center; align-items: center; gap: 48px; text-align: left; padding: 40px 40px; }
    .hero-text-block { order: 1; margin-top: 0; padding: 20px 24px 16px; width: auto; max-width: 380px; }
    .hero-carousel { order: 2; margin: 0; width: clamp(300px, 28vw, 380px); }
    .hero-title .line1 { font-size: clamp(16px, 2vw, 22px); }
    .hero-title .line2 { font-size: clamp(24px, 3.5vw, 38px); white-space: nowrap; }
    .hero-catchbox { align-self: flex-start; font-size: clamp(11px, 1.4vw, 14px); }
    .hero-ctas { order: 3; justify-content: flex-start; width: auto; max-width: 380px; margin-top: 0; }
  }
</style>
</head>
<body>

<header>
  <h1>100均アプリ</h1>
  <nav><a href="mailto:apps100kin@gmail.com">開発者へ問合せ</a></nav>
</header>

<p class="sub-tagline">自分（開発者）が逆の立場でも100円なら払ってもいいな！？<br>と思えるものをつくりました。</p>

<div id="appRoot">
  <section class="hero">
    <p style="opacity:0.7; font-size:13px;">読み込み中...</p>
  </section>
</div>

<footer>
  <a href="mailto:apps100kin@gmail.com">開発者への問合せ</a>
  <br><br>
  © 2026 100均アプリ — siro
  <a class="admin-link" href="admin/login.html">管理者</a>
</footer>

<script type="module">
  import { db } from "./firebase-config.js";
  import { collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  function starString(stars) {
    const full = Math.round(stars || 0);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function initHeroCarousel(root, pageCount) {
    const carousel = root.querySelector('.hero-carousel');
    if (!carousel || pageCount <= 0) return;
    const viewport = carousel.querySelector('.hero-carousel-viewport');
    const track = carousel.querySelector('.hero-carousel-track');
    let index = 0;
    let dragging = false;
    let startX = 0;
    let dragX = 0;
    let viewportWidth = 0;

    function setIndex(i, animate) {
      index = (i + pageCount) % pageCount;
      track.style.transition = animate ? 'transform 0.3s ease' : 'none';
      track.style.transform = `translateX(-${index * 100}%)`;
    }
    setIndex(0, false);

    carousel.querySelector('[data-role="heroPrev"]').addEventListener('click', () => setIndex(index - 1, true));
    carousel.querySelector('[data-role="heroNext"]').addEventListener('click', () => setIndex(index + 1, true));

    track.addEventListener('pointerdown', (e) => {
      dragging = true;
      startX = e.clientX;
      dragX = 0;
      viewportWidth = viewport.getBoundingClientRect().width;
      track.style.transition = 'none';
      track.setPointerCapture(e.pointerId);
    });
    track.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      dragX = e.clientX - startX;
      track.style.transform = `translateX(calc(-${index * 100}% + ${dragX}px))`;
    });
    function endDrag() {
      if (!dragging) return;
      dragging = false;
      const threshold = viewportWidth * 0.15;
      if (dragX > threshold) setIndex(index - 1, true);
      else if (dragX < -threshold) setIndex(index + 1, true);
      else setIndex(index, true);
      dragX = 0;
    }
    track.addEventListener('pointerup', endDrag);
    track.addEventListener('pointercancel', endDrag);
  }

  function chunkSlides(arr, size) {
    const out = [];
    for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
    return out;
  }

  // トップページ用静的スクリーンショット（4枚）
  const TOP_PAGE_IMAGES = [
    'images/IMG_9266.PNG',
    'images/IMG_9267.PNG',
    'images/IMG_9268.PNG',
    'images/IMG_9270.PNG'
  ];

  function renderHero(appDoc) {
    const detailLink = `app-detail.html?app=${encodeURIComponent(appDoc.id)}`;
    const catchText = (appDoc.catchWords || []).join('');
    const features = appDoc.features || [];

    const root = document.getElementById('appRoot');
    root.innerHTML = `
      <section class="hero">
        <div class="hero-carousel">
          <div class="hero-carousel-viewport">
            <div class="hero-carousel-track">
              <img class="hero-screenshot" src="${TOP_PAGE_IMAGES[0]}" alt="スクリーンショット1">
              <img class="hero-screenshot" src="${TOP_PAGE_IMAGES[1]}" alt="スクリーンショット2">
              <img class="hero-screenshot" src="${TOP_PAGE_IMAGES[2]}" alt="スクリーンショット3">
              <img class="hero-screenshot" src="${TOP_PAGE_IMAGES[3]}" alt="スクリーンショット4">
            </div>
          </div>
          <div class="arrow left" data-role="heroPrev">&#8249;</div>
          <div class="arrow right" data-role="heroNext">&#8250;</div>
        </div>
        <div class="hero-text-block">
          <p class="hero-title"><span class="line1">1作目</span><span class="line2">${escapeHtml(appDoc.name || '')}</span></p>
          ${catchText ? `<p class="hero-catchbox">${escapeHtml(catchText)}</p>` : ''}
        </div>
        <div class="hero-ctas">
          <a class="hero-btn guest" href="${escapeHtml(appDoc.guestLink || detailLink)}">ゲストで試す</a>
          <a class="hero-btn purchase" href="${escapeHtml(appDoc.stripeLink || detailLink)}" target="_blank">購入する</a>
        </div>
        <a class="scroll-hint" href="#features">
          <span>特徴を見る</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </a>
      </section>

      <section class="features-section" id="features">
        <p class="section-label">${escapeHtml(appDoc.name || '')}『開発の動機』</p>
        ${features.map((f, i) => `
          <div class="feature-item">
            <div class="mark">${i + 1}</div>
            <p class="feature-text">${escapeHtml(f)}</p>
          </div>
        `).join('')}
      </section>

      <section class="detail-cta">
        <p class="price-line">¥${escapeHtml(appDoc.price ?? '')} <span>${escapeHtml(appDoc.priceNote || '')}</span></p>
        <a class="cta-btn" href="${detailLink}">詳細・購入ページへ →</a>
      </section>

      <section class="more-apps" id="moreApps"></section>
    `;

    const items = root.querySelectorAll('.feature-item');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.3 });
    items.forEach(item => observer.observe(item));

    initHeroCarousel(root, 4); // 静的画像4枚を1枚ずつ表示
  }

  function renderMoreApps(apps) {
    if (!apps.length) return;
    const section = document.getElementById('moreApps');
    section.innerHTML = `
      <p class="section-label">他のアプリ</p>
      ${apps.map(app => `
        <a class="more-app-card" href="app-detail.html?app=${encodeURIComponent(app.id)}">
          <div class="icon">${escapeHtml(app.icon || '📦')}</div>
          <div>
            <p class="name">${escapeHtml(app.name || '')}</p>
            <span class="stars">${starString(app.stars)}</span>
          </div>
        </a>
      `).join('')}
      <div class="placeholder-note">この下は3作目以降が入るスペースです</div>
    `;
  }

  async function loadApps() {
    const root = document.getElementById('appRoot');
    try {
      const q = query(collection(db, 'apps'), where('published', '==', true), orderBy('order'));
      const snap = await getDocs(q);
      const apps = [];
      snap.forEach(docSnap => apps.push({ id: docSnap.id, ...docSnap.data() }));

      if (!apps.length) {
        root.innerHTML = '<p style="text-align:center; color:var(--muted); font-size:13px; padding:80px 20px;">公開中のアプリがありません。</p>';
        return;
      }

      renderHero(apps[0]);
      renderMoreApps(apps.slice(1));
    } catch (err) {
      console.error('アプリ一覧の読み込みに失敗しました', err);
      root.innerHTML = '<p style="text-align:center; color:var(--muted); font-size:13px; padding:80px 20px;">読み込みに失敗しました。時間をおいて再度お試しください。</p>';
    }
  }

  loadApps();
</script>

</body>
</html>
