<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問い合わせ一覧 — 100均アプリ 管理画面</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --primary: #2d5a27;
    --accent: #e8a020;
    --text: #1a1a18;
    --muted: #6b6b66;
    --border: #e0ddd6;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; padding-top: 52px; }

  header {
    background: var(--primary);
    padding: 0 24px;
    height: 52px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 14px;
  }
  header h1 {
    color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
    border: 2px solid #fff; padding: 3px 12px; border-radius: 6px; white-space: nowrap;
  }
  header .badge { color: var(--accent); font-size: 12px; font-weight: 700; }
  header nav { margin-left: auto; display: flex; gap: 18px; }
  header nav a { color: #b8d9b2; font-size: 13px; text-decoration: none; }
  header nav a:hover, header nav a.active { color: #fff; }

  .layout { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }

  .page-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-btn {
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px;
    padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer;
  }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .inquiry-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    cursor: pointer;
  }
  .inquiry-card.unread { border-left: 3px solid var(--accent); }
  .inquiry-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .unread-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .inquiry-subject { font-size: 14px; font-weight: 700; }
  .inquiry-meta { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .inquiry-from { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .inquiry-body { font-size: 13px; line-height: 1.7; color: var(--text); }
  .inquiry-actions { margin-top: 10px; }
  .inquiry-actions a {
    font-size: 12px; color: var(--primary); text-decoration: none; margin-right: 14px;
  }
  .inquiry-actions a:hover { text-decoration: underline; }

  .section-title {
    font-size: 13px; font-weight: 700; color: var(--primary);
    letter-spacing: 0.1em; padding-bottom: 6px;
    border-bottom: 2px solid var(--primary); margin: 40px 0 16px;
  }

  .review-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .review-card.hidden-review { opacity: 0.55; }
  .review-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .review-stars { color: var(--accent); font-size: 14px; }
  .review-user { font-size: 13px; font-weight: 700; }
  .review-app { font-size: 11px; color: var(--muted); }
  .review-meta { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .flag-badge {
    background: #fbe3e0; color: #b5392f; font-size: 11px; font-weight: 700;
    border-radius: 6px; padding: 2px 8px;
  }
  .hidden-badge {
    background: var(--bg); color: var(--muted); font-size: 11px; font-weight: 700;
    border: 0.5px solid var(--border); border-radius: 6px; padding: 2px 8px;
  }
  .review-comment { font-size: 13px; line-height: 1.7; margin-bottom: 10px; }
  .review-actions { display: flex; gap: 8px; }
  .review-actions button {
    font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer;
    border: 0.5px solid var(--border); background: var(--bg); color: var(--text);
  }
  .review-actions button.btn-hide { color: #7a5c10; border-color: #e8c878; background: #fdf6e8; }
  .review-actions button.btn-restore { color: var(--primary); border-color: #b8d9b2; background: #e8f5e4; }
  .review-actions button.btn-delete { color: #b5392f; border-color: #f0bdb6; background: #fbe3e0; }

  footer { background: var(--primary); color: #b8d9b2; text-align: center; padding: 20px; font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>100均アプリ</h1>
  <span class="badge">ADMIN</span>
  <nav>
    <a href="dashboard.html">ダッシュボード</a>
    <a href="inquiries.html" class="active">問い合わせ</a>
    <a href="mail-send.html">一斉メール</a>
    <a href="../index.html">サイトを見る</a>
  </nav>
</header>

<div class="layout">

  <p class="page-title">問い合わせ一覧</p>
  <p class="page-sub">購入ユーザーからのメッセージを時系列で表示しています</p>

  <div class="filter-row">
    <div class="filter-btn active" data-filter="all">すべて</div>
    <div class="filter-btn" data-filter="unread">未読のみ</div>
  </div>

  <div id="inquiryList"></div>

  <p class="section-title">レビュー管理</p>
  <p class="page-sub">星1〜2のレビューには「要確認」バッジが自動表示されます。まず非表示にして、必要なら復元できます。</p>

  <div class="filter-row">
    <div class="filter-btn active" data-review-filter="all">すべて</div>
    <div class="filter-btn" data-review-filter="flagged">要確認のみ</div>
    <div class="filter-btn" data-review-filter="hidden">非表示のみ</div>
  </div>

  <div id="reviewList"></div>

</div>

<footer>
  © 2026 100均アプリ — siro（管理画面）
</footer>

<script>
  const inquiries = [
    { subject: '同期がうまくいきません', from: 'tanaka@example.com', date: '2026-06-21 18:42', body: 'PCで入力したメモがスマホ側に反映されないことがあります。ブラウザはChromeを使っています。確認していただけますか？', unread: true },
    { subject: '次回作のリクエスト', from: 'nat-chan@example.com', date: '2026-06-20 09:15', body: '糖尿人のカウンター、楽しみにしています！血糖値の記録もできるようになると嬉しいです。', unread: true },
    { subject: '領収書がほしい', from: 'mayumine@example.com', date: '2026-06-18 21:03', body: '会社の経費精算用に領収書を発行していただくことは可能でしょうか。', unread: true },
    { subject: '使い方について', from: 'satoh@example.com', date: '2026-06-10 12:30', body: 'カードを別のパネルに移動する方法が分かりません。教えてください。', unread: false },
  ];

  const listEl = document.getElementById('inquiryList');
  let filter = 'all';

  function render() {
    const items = filter === 'unread' ? inquiries.filter(i => i.unread) : inquiries;
    listEl.innerHTML = items.map(i => `
      <div class="inquiry-card ${i.unread ? 'unread' : ''}">
        <div class="inquiry-head">
          ${i.unread ? '<span class="unread-dot"></span>' : ''}
          <span class="inquiry-subject">${i.subject}</span>
          <span class="inquiry-meta">${i.date}</span>
        </div>
        <p class="inquiry-from">${i.from}</p>
        <p class="inquiry-body">${i.body}</p>
        <div class="inquiry-actions">
          <a href="mailto:${i.from}?subject=Re: ${encodeURIComponent(i.subject)}">返信する</a>
        </div>
      </div>
    `).join('');
  }

  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  render();

  // --- レビュー管理 ---
  const reviews = [
    { id: 1, app: 'PCスマホ連動メモ', user: 'なっちゃん',   rating: 4, date: '2026-01-26', comment: '仕事のメモをPCで入力して、外出先でスマホで確認できて便利です。シンプルで使いやすいです。', status: 'visible' },
    { id: 2, app: 'PCスマホ連動メモ', user: 'マユミーヌ',   rating: 5, date: '2026-01-01', comment: 'Dropboxの契約を解約できました。これで十分です。ありがとうございます。', status: 'visible' },
    { id: 3, app: 'PCスマホ連動メモ', user: 'けんと',       rating: 1, date: '2026-06-15', comment: '同期が頻繁に失敗します。直してほしいです。', status: 'visible' },
    { id: 4, app: '糖尿人のカウンター', user: 'ひろき',     rating: 2, date: '2026-06-12', comment: '入力項目が多くて使いにくいと感じました。もう少し簡略化してほしいです。', status: 'visible' },
    { id: 5, app: 'PCスマホ連動メモ', user: 'あゆ',         rating: 1, date: '2026-06-08', comment: '広告みたいなレビューを投稿していた荒らしユーザー（運営にて非表示済み）。', status: 'hidden' },
  ];

  const reviewListEl = document.getElementById('reviewList');
  let reviewFilter = 'all';

  function starString(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

  function renderReviews() {
    let items = reviews;
    if (reviewFilter === 'flagged') {
      items = reviews.filter(r => r.rating <= 2 && r.status !== 'deleted');
    } else if (reviewFilter === 'hidden') {
      items = reviews.filter(r => r.status === 'hidden');
    } else {
      items = reviews.filter(r => r.status !== 'deleted');
    }

    reviewListEl.innerHTML = items.map(r => {
      const flagged = r.rating <= 2;
      const isHidden = r.status === 'hidden';
      return `
      <div class="review-card ${isHidden ? 'hidden-review' : ''}">
        <div class="review-head">
          <span class="review-stars">${starString(r.rating)}</span>
          <span class="review-user">${r.user}</span>
          <span class="review-app">／ ${r.app}</span>
          ${flagged ? '<span class="flag-badge">要確認</span>' : ''}
          ${isHidden ? '<span class="hidden-badge">非表示中</span>' : ''}
          <span class="review-meta">${r.date}</span>
        </div>
        <p class="review-comment">${r.comment}</p>
        <div class="review-actions">
          ${isHidden
            ? `<button class="btn-restore" onclick="restoreReview(${r.id})">復元する</button>`
            : `<button class="btn-hide" onclick="hideReview(${r.id})">非表示にする</button>`}
          <button class="btn-delete" onclick="deleteReview(${r.id})">削除する</button>
        </div>
      </div>
      `;
    }).join('') || '<p class="page-sub">該当するレビューはありません</p>';
  }

  function hideReview(id) {
    const r = reviews.find(x => x.id === id);
    if (r) r.status = 'hidden';
    renderReviews();
  }

  function restoreReview(id) {
    const r = reviews.find(x => x.id === id);
    if (r) r.status = 'visible';
    renderReviews();
  }

  function deleteReview(id) {
    if (!confirm('このレビューを削除します。削除すると復元できません。よろしいですか？\n（先に「非表示にする」を使うことをおすすめします）')) return;
    const r = reviews.find(x => x.id === id);
    if (r) r.status = 'deleted';
    renderReviews();
  }

  document.querySelectorAll('.filter-btn[data-review-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-review-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      reviewFilter = btn.dataset.reviewFilter;
      renderReviews();
    });
  });

  renderReviews();
</script>

</body>
</html>
