<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#346b2c"/>
      <stop offset="100%" stop-color="#162e0e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg5)"/>
  <!-- Inner border -->
  <rect x="18" y="18" width="476" height="476" rx="72" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
  <!-- Top horizontal accent line -->
  <rect x="52" y="96" width="408" height="5" rx="2.5" fill="rgba(255,224,51,0.5)"/>
  <!-- Divider line between 100 and 均 -->
  <rect x="52" y="278" width="408" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
  <!-- Bottom horizontal accent line -->
  <rect x="52" y="415" width="408" height="5" rx="2.5" fill="rgba(255,224,51,0.5)"/>
  <!-- "100" top line - white, bold -->
  <text
    x="256"
    y="240"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="182"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-4">100</text>
  <!-- "均" bottom line - yellow, bold -->
  <text
    x="256"
    y="398"
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif"
    font-size="152"
    font-weight="900"
    fill="#ffe033">均</text>
</svg>
