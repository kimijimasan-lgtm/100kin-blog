<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCスマホ連動メモ — 100均アプリ</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --primary: #2d5a27;
    --accent: #e8a020;
    --text: #1a1a18;
    --muted: #6b6b66;
    --border: #e0ddd6;
    --radius: 12px;
    --header-h: 52px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    padding-top: 52px;
  }

  /* 固定ヘッダー */
  header {
    background: var(--primary);
    padding: 0 24px;
    height: 52px; min-height: 52px; max-height: 52px;
    overflow: hidden;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    display: flex; align-items: center; gap: 14px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  header a.back { color: #b8d9b2; text-decoration: none; flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 1.5px solid #b8d9b2; border-radius: 6px; font-size: 16px; line-height: 1; }
  header a.back:hover { color: #fff; }
  header h1 { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.06em; border: 2px solid #fff; padding: 3px 12px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
  header .catch { color: #ffe033; font-size: 12px; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; min-width: 0; }

  .breadcrumb { padding: 10px 24px; font-size: 12px; color: var(--muted); }
  .breadcrumb a { color: var(--primary); text-decoration: none; }

  /* 3カラムレイアウト */
  .layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 24px 60px;
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 24px;
    align-items: start;
  }
  /* 横向き時の3カラム比率(1:2:1)を縦向きでも維持し、画面幅に応じて縮小表示する。
     1カラムへの崩しは行わず、ガター・パディングのみ詰めて窮屈さを抑える。 */
  @media (max-width: 700px) {
    .layout { padding: 10px 12px 40px; gap: 10px; }
    .arrow { width: 22px; height: 22px; font-size: 11px; }
    .app-name { font-size: 13px; margin-bottom: 2px; }
    .app-catch { font-size: 10px; margin-bottom: 6px; }
    .stars-row { gap: 4px; margin-bottom: 8px; }
    .stars { font-size: 11px; }
    .review-link { font-size: 9px; }
    .features-title { font-size: 10px; margin-bottom: 5px; }
    .features-list { margin-bottom: 10px; }
    .features-list li { font-size: 10px; padding: 3px 0; }
    .spec-table { font-size: 9px; margin-bottom: 10px; }
    .spec-table td { padding: 4px 2px; }
    .purchase-box { padding: 10px; position: static; }
    .price { font-size: 14px; margin-bottom: 4px; }
    .price span { font-size: 9px; }
    .purchase-note { font-size: 9px; margin-bottom: 8px; }
    .btn { padding: 7px; font-size: 10px; margin-bottom: 6px; }
    .limit-note { font-size: 9px; padding: 6px 8px; margin-bottom: 8px; }
    .contact-link { font-size: 9px; margin-top: 8px; }
    .section-title { font-size: 10px; padding-bottom: 4px; margin-bottom: 10px; }
    .review-card { padding: 8px; margin-bottom: 8px; }
    .avatar { width: 22px; height: 22px; font-size: 9px; }
    .reviewer { font-size: 9px; }
    .review-meta { font-size: 8px; }
    .review-stars { font-size: 9px; }
    .review-text { font-size: 9px; margin-top: 4px; }
  }

  /* 左：縦長ビューワー */
  .viewer-wrap {
    position: relative;
  }
  .screenshot-main {
    width: 100%;
    aspect-ratio: 9/19.5;
    background: linear-gradient(135deg, #d4e8d0, #a8cfa0);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
  }
  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.88);
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 17px; color: var(--text);
    transition: background 0.15s; z-index: 10;
    user-select: none;
  }
  .arrow:hover { background: #fff; }
  .arrow.left  { left: 6px; }
  .arrow.right { right: 6px; }
  .slide-label {
    text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px;
  }

  /* アプリ情報 */
  .app-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .app-catch { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
  .stars-row { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; }
  .stars { color: var(--accent); font-size: 16px; }
  .review-link { font-size: 13px; color: var(--primary); }

  .features-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
  .features-list { list-style: none; margin-bottom: 24px; }
  .features-list li { font-size: 14px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
  .features-list li::before { content: "✓ "; color: var(--primary); font-weight: 700; }

  .spec-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 24px; }
  .spec-table tr { border-bottom: 0.5px solid var(--border); }
  .spec-table td { padding: 8px 4px; }
  .spec-table td:first-child { color: var(--muted); width: 40%; }

  /* 購入ボックス */
  .purchase-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: sticky;
    top: 64px;
    align-self: start;
  }
  .price { font-size: 28px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .price span { font-size: 13px; color: var(--muted); font-weight: 400; display: block; margin-top: 2px; }
  .purchase-note { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  .btn {
    display: block; width: 100%; padding: 13px;
    border-radius: 8px; font-size: 15px; font-weight: 700;
    text-align: center; cursor: pointer; border: none;
    margin-bottom: 10px; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #c98910; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); font-size: 14px; }
  .btn-secondary:hover { background: var(--border); }

  .limit-note {
    background: #fdf6e8; border: 0.5px solid #e8c878;
    border-radius: 8px; padding: 10px 12px;
    font-size: 12px; color: #7a5c10; margin-bottom: 12px;
  }
  .limit-note ul { padding-left: 14px; margin-top: 4px; }
  .limit-note li { margin-top: 3px; }

  .contact-link { text-align: center; font-size: 12px; color: var(--muted); margin-top: 14px; }
  .contact-link a { color: var(--primary); }

  /* レビュー */
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--primary);
    letter-spacing: 0.1em; padding-bottom: 6px;
    border-bottom: 2px solid var(--primary); margin-bottom: 16px;
  }
  .review-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  }
  .review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .reviewer { font-size: 13px; font-weight: 700; }
  .review-meta { font-size: 11px; color: var(--muted); }
  .review-stars { color: var(--accent); font-size: 13px; }
  .review-text { font-size: 13px; line-height: 1.7; margin-top: 6px; }

  footer {
    background: var(--primary); color: #b8d9b2;
    text-align: center; padding: 20px; font-size: 12px;
  }
  footer a { color: #b8d9b2; margin: 0 10px; text-decoration: none; }
  footer a:hover { color: #fff; }
  footer .admin-link {
    color: rgba(184,217,178,0.35); font-size: 10px;
    border: none; background: none; cursor: pointer;
    font-family: inherit;
  }
  footer .admin-link:hover { color: rgba(184,217,178,0.7); }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html" title="ホームに戻る"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/><path d="M3 12v9h18V12"/></svg></a>
  <h1>100均アプリ</h1>
  <span class="catch">自分（開発者）が逆の立場でも「100円なら払ってもいいな！？」と思えるものをつくりました。</span>
</header>

<div class="breadcrumb">
  <a href="index.html">ホーム</a> › PCスマホ連動メモ
</div>

<div class="layout" id="layout">
  <p style="text-align:center; color:var(--muted); font-size:13px; grid-column: 1 / -1;">読み込み中...</p>
</div>

<template id="detailTemplate">

  <!-- 左 1/4：縦長ビューワー -->
  <div>
    <div class="viewer-wrap">
      <div class="screenshot-main" data-role="viewer"></div>
      <div class="arrow left"  data-role="prev">&#8249;</div>
      <div class="arrow right" data-role="next">&#8250;</div>
    </div>
    <p class="slide-label" data-role="slideLabel"></p>
  </div>

  <!-- 中 2/4：解説 -->
  <div>
    <p class="app-name" data-role="name"></p>
    <p class="app-catch" data-role="catch"></p>
    <div class="stars-row">
      <span class="stars" data-role="stars"></span>
      <a class="review-link" href="#reviews" data-role="reviewCount"></a>
    </div>

    <p class="features-title">このアプリでできること</p>
    <ul class="features-list" data-role="features"></ul>

    <table class="spec-table" data-role="specs"></table>

    <!-- レビュー -->
    <div id="reviews" style="margin-top:32px;">
      <p class="section-title">カスタマーレビュー</p>
      <div data-role="reviewList"></div>
    </div>
  </div>

  <!-- 右 1/4：購入ボックス -->
  <div>
    <div class="purchase-box">
      <p class="price" data-role="price"></p>

      <a class="btn btn-primary" data-role="stripeLink" target="_blank">
        購入してログイン
      </a>

      <a class="btn btn-secondary" data-role="guestLink">
        ゲストで試してみる
      </a>

      <div class="contact-link">
        <a href="#reviews">アプリのレビューを投稿する ↓</a>
      </div>
    </div>
  </div>

</template>

<footer>
  <a href="index.html">ホームに戻る</a>
  <a href="mailto:apps100kin@gmail.com">開発者への問合せ</a>
  <br><br>
  © 2026 100均アプリ — siro
  <a class="admin-link" href="admin/login.html">管理者</a>
</footer>

<script type="module">
  import { db } from "./firebase-config.js";
  import { doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  function starString(stars) {
    const full = Math.round(stars || 0);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function specLabel(key) {
    return { os: '対応OS', format: '形式', developer: '開発者', updatedAt: '更新日' }[key] || key;
  }

  async function loadApp() {
    const params = new URLSearchParams(window.location.search);
    const appId = params.get('app') || 'memo-sync';
    const layout = document.getElementById('layout');

    try {
      const appSnap = await getDoc(doc(db, 'apps', appId));
      if (!appSnap.exists()) throw new Error('app not found');
      const appDoc = appSnap.data();

      const reviewsQuery = query(collection(db, 'apps', appId, 'reviews'), where('hidden', '==', false));
      const reviewsSnap = await getDocs(reviewsQuery);
      const reviews = [];
      reviewsSnap.forEach(r => reviews.push(r.data()));

      const tpl = document.getElementById('detailTemplate').content.cloneNode(true);
      layout.innerHTML = '';
      layout.appendChild(tpl);

      document.title = `${appDoc.name} — 100均アプリ`;
      layout.querySelector('[data-role="name"]').textContent = appDoc.name || '';
      layout.querySelector('[data-role="catch"]').textContent = (appDoc.catchWords || []).join('');
      layout.querySelector('[data-role="stars"]').textContent = starString(appDoc.stars);
      layout.querySelector('[data-role="reviewCount"]').textContent = `${reviews.length}件のレビュー`;

      const featuresEl = layout.querySelector('[data-role="features"]');
      (appDoc.features || []).forEach(f => {
        const li = document.createElement('li');
        li.textContent = f;
        featuresEl.appendChild(li);
      });

      const specsEl = layout.querySelector('[data-role="specs"]');
      Object.entries(appDoc.specs || {}).forEach(([key, value]) => {
        const tr = document.createElement('tr');
        const tdLabel = document.createElement('td');
        tdLabel.textContent = specLabel(key);
        const tdValue = document.createElement('td');
        tdValue.textContent = value;
        tr.appendChild(tdLabel);
        tr.appendChild(tdValue);
        specsEl.appendChild(tr);
      });

      const reviewListEl = layout.querySelector('[data-role="reviewList"]');
      reviews.forEach(r => {
        const card = document.createElement('div');
        card.className = 'review-card';
        card.innerHTML = `
          <div class="review-header">
            <div class="avatar">${(r.author || '?').charAt(0)}</div>
            <div>
              <p class="reviewer"></p>
              <p class="review-meta"></p>
            </div>
          </div>
          <div class="review-stars"></div>
          <p class="review-text"></p>
        `;
        card.querySelector('.reviewer').textContent = r.author || '';
        card.querySelector('.review-meta').textContent = r.date || '';
        card.querySelector('.review-stars').textContent = starString(r.stars);
        card.querySelector('.review-text').textContent = r.text || '';
        reviewListEl.appendChild(card);
      });

      layout.querySelector('[data-role="price"]').innerHTML = `¥${appDoc.price ?? ''}<br><span>（買い切り）</span>`;
      layout.querySelector('[data-role="stripeLink"]').href = appDoc.stripeLink || '#';
      layout.querySelector('[data-role="guestLink"]').href = appDoc.guestLink || '#';

      const slides = appDoc.slides || [];
      let cur = 0;
      const viewerEl = layout.querySelector('[data-role="viewer"]');
      const labelEl  = layout.querySelector('[data-role="slideLabel"]');

      function goTo(i) {
        if (!slides.length) return;
        cur = (i + slides.length) % slides.length;
        viewerEl.textContent = slides[cur].emoji;
        viewerEl.style.background = slides[cur].bg;
        labelEl.textContent = slides[cur].label;
      }
      goTo(0);
      layout.querySelector('[data-role="prev"]').addEventListener('click', () => goTo(cur - 1));
      layout.querySelector('[data-role="next"]').addEventListener('click', () => goTo(cur + 1));

    } catch (err) {
      console.error('アプリ詳細の読み込みに失敗しました', err);
      layout.innerHTML = '<p style="text-align:center; color:var(--muted); font-size:13px; grid-column: 1 / -1;">読み込みに失敗しました。時間をおいて再度お試しください。</p>';
    }
  }

  loadApp();
</script>

</body>
</html>
