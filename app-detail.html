<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCスマホ連動メモ — 100均アプリ</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --primary: #2d5a27;
    --accent: #e8a020;
    --text: #1a1a18;
    --muted: #6b6b66;
    --border: #e0ddd6;
    --radius: 12px;
    --header-h: 52px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    padding-top: 52px;
  }

  /* 固定ヘッダー */
  header {
    background: var(--primary);
    padding: 0 24px;
    height: 52px; min-height: 52px; max-height: 52px;
    overflow: hidden;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 14px;
  }
  header a.logo-link {
    color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
    border: 2px solid #fff; padding: 3px 12px; border-radius: 6px;
    white-space: nowrap; flex-shrink: 0; text-decoration: none;
  }
  header a.logo-link:hover { opacity: 0.85; }

  /* ─── Page 1：スクリーンショット＋解説文（1画面） ─── */
  .viewer-section {
    height: calc(100dvh - var(--header-h));
    background: #16280f;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 24px 0;
    overflow: hidden;
  }

  /* スクショ＋解説のフレックスコンテナ */
  .viewer-area {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 360px;
    gap: 12px;
  }

  /* スクショ側（2/3）*/
  .viewer-wrap {
    flex: 2 1 0;
    min-height: 0;
    display: flex;
    justify-content: center;
    position: relative;
  }
  .screenshot-main {
    height: 100%;
    aspect-ratio: 9/19.5;
    width: auto;
    max-width: 100%;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.14);
    position: relative;
  }
  .viewer-content {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    background: #000;
  }
  .viewer-content img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* 矢印：viewer-wrap の左右端（スクショ枠の外側）に絶対配置 */
  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.92);
    border: 0.5px solid rgba(0,0,0,0.12);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    border-radius: 50%;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 24px; color: var(--text);
    transition: background 0.15s; z-index: 10;
    user-select: none;
  }
  .arrow:hover { background: #fff; }
  .arrow.left  { left: 0; }
  .arrow.right { right: 0; }

  /* 解説文側（1/3）*/
  .slide-description {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 17px;
    line-height: 1.75;
    color: var(--text);
  }

  /* スクロールヒント */
  .page-scroll-hint {
    flex-shrink: 0;
    padding: 10px 0 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--muted);
    font-size: 11px;
    animation: hint-bounce 2s ease-in-out infinite;
  }
  .page-scroll-hint svg { width: 16px; height: 16px; }
  @keyframes hint-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* ─── ページ区切り ─── */
  .page-divider {
    background: var(--primary);
    color: #fff;
    text-align: center;
    padding: 10px 24px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
  }

  /* ─── Page 2：購入＋レビュー ─── */
  .detail-section {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .app-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .app-catch { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
  .stars-row { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
  .stars { color: var(--accent); font-size: 16px; }
  .review-link { font-size: 13px; color: var(--primary); }

  .purchase-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 32px;
  }
  .price { font-size: 28px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
  .price span { font-size: 13px; color: var(--muted); font-weight: 400; display: block; margin-top: 2px; }

  .btn {
    display: block; width: 100%; padding: 13px;
    border-radius: 8px; font-size: 15px; font-weight: 700;
    text-align: center; cursor: pointer; border: none;
    margin-bottom: 10px; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #c98910; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); font-size: 14px; }
  .btn-secondary:hover { background: var(--border); }

  .contact-link { text-align: center; font-size: 12px; color: var(--muted); margin-top: 14px; }
  .contact-link a { color: var(--primary); }

  /* レビュー */
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--primary);
    letter-spacing: 0.1em; padding-bottom: 6px;
    border-bottom: 2px solid var(--primary); margin-bottom: 16px;
  }
  .review-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  }
  .review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .reviewer { font-size: 13px; font-weight: 700; }
  .review-meta { font-size: 11px; color: var(--muted); }
  .review-stars { color: var(--accent); font-size: 13px; }
  .review-text { font-size: 13px; line-height: 1.7; margin-top: 6px; }

  footer {
    background: var(--primary); color: #b8d9b2;
    text-align: center; padding: 20px; font-size: 12px;
  }
  footer a { color: #b8d9b2; margin: 0 10px; text-decoration: none; }
  footer a:hover { color: #fff; }
  footer .admin-link {
    color: rgba(184,217,178,0.35); font-size: 10px;
    border: none; background: none; cursor: pointer;
    font-family: inherit;
  }
  footer .admin-link:hover { color: rgba(184,217,178,0.7); }

  @media (max-width: 480px) {
    .viewer-content { font-size: 48px; }
    .screenshot-main { border-radius: 22px; }
    .arrow { width: 40px; height: 40px; font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo-link" href="index.html">100均アプリ</a>
</header>

<div id="layout">
  <p style="text-align:center; color:var(--muted); font-size:13px; padding:80px 20px;">読み込み中...</p>
</div>

<template id="detailTemplate">

  <!-- ─── Page 1：スクリーンショット＋解説文（1画面） ─── -->
  <section class="viewer-section">
    <div class="viewer-area">
      <div class="viewer-wrap">
        <div class="arrow left" data-role="prev">&#8249;</div>
        <div class="screenshot-main">
          <div class="viewer-content" data-role="viewer"></div>
        </div>
        <div class="arrow right" data-role="next">&#8250;</div>
      </div>
      <div class="slide-description" data-role="slideLabel"></div>
    </div>
    <div class="page-scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      <span>詳細・購入へ</span>
    </div>
  </section>

  <!-- ─── ページ区切り ─── -->
  <div class="page-divider">詳 細 ・ 購 入</div>

  <!-- ─── Page 2：購入＋レビュー ─── -->
  <section class="detail-section">
    <p class="app-name" data-role="name"></p>
    <p class="app-catch" data-role="catch"></p>
    <div class="stars-row">
      <span class="stars" data-role="stars"></span>
      <a class="review-link" href="#reviews" data-role="reviewCount"></a>
    </div>

    <div class="purchase-box">
      <p class="price" data-role="price"></p>
      <a class="btn btn-primary" data-role="stripeLink" target="_blank">
        購入してログイン
      </a>
      <a class="btn btn-secondary" data-role="guestLink">
        ゲストで試してみる
      </a>
      <div class="contact-link">
        <a href="#reviews">アプリのレビューを投稿する ↓</a>
      </div>
    </div>

    <div id="reviews">
      <p class="section-title">カスタマーレビュー</p>
      <div data-role="reviewList"></div>
    </div>
  </section>

</template>

<footer>
  <a href="index.html">ホームに戻る</a>
  <a href="mailto:apps100kin@gmail.com">開発者への問合せ</a>
  <br><br>
  © 2026 100均アプリ — siro
  <a class="admin-link" href="admin/login.html">管理者</a>
</footer>

<script type="module">
  import { db } from "./firebase-config.js";
  import { doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  function starString(stars) {
    const full = Math.round(stars || 0);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  // 詳細ページ用スクリーンショット（6枚：トップページに表示しない残りの画像）
  const STATIC_SLIDES = [
    { image: 'images/IMG_9271.PNG', description: 'メモの編集画面。シンプルで使いやすいエディタで快適に入力できます。' },
    { image: 'images/IMG_9272.PNG', description: '画像の貼り付けにも対応。スクリーンショットや写真をメモに追加できます。' },
    { image: 'images/IMG_9273.PNG', description: '縦画像は自動で2列レイアウト。複数の画像も見やすく整理されます。' },
    { image: 'images/IMG_9274.PNG', description: 'YouTube動画の埋め込みも可能。URLを貼り付けるだけで動画プレーヤーが表示されます。' },
    { image: 'images/IMG_9276.PNG', description: '全文検索機能で目的のメモをすばやく発見。キーワードでカテゴリ横断検索できます。' },
    { image: 'images/IMG_9277.PNG', description: 'Googleアカウントでログイン。複数デバイス間でデータを安全に同期できます。' },
  ];

  async function loadApp() {
    const params = new URLSearchParams(window.location.search);
    const appId = params.get('app') || 'memo-sync';
    const layout = document.getElementById('layout');

    try {
      const appSnap = await getDoc(doc(db, 'apps', appId));
      if (!appSnap.exists()) throw new Error('app not found');
      const appDoc = appSnap.data();

      const reviewsQuery = query(collection(db, 'apps', appId, 'reviews'), where('hidden', '==', false));
      const reviewsSnap = await getDocs(reviewsQuery);
      const reviews = [];
      reviewsSnap.forEach(r => reviews.push(r.data()));

      const tpl = document.getElementById('detailTemplate').content.cloneNode(true);
      layout.innerHTML = '';
      layout.appendChild(tpl);

      document.title = `${appDoc.name} — 100均アプリ`;
      layout.querySelector('[data-role="name"]').textContent = appDoc.name || '';
      layout.querySelector('[data-role="catch"]').textContent = (appDoc.catchWords || []).join('');
      layout.querySelector('[data-role="stars"]').textContent = starString(appDoc.stars);
      layout.querySelector('[data-role="reviewCount"]').textContent = `${reviews.length}件のレビュー`;
      layout.querySelector('[data-role="price"]').innerHTML = `¥${appDoc.price ?? ''}<br><span>（買い切り）</span>`;
      layout.querySelector('[data-role="stripeLink"]').href = appDoc.stripeLink || '#';
      layout.querySelector('[data-role="guestLink"]').href = appDoc.guestLink || '#';

      const reviewListEl = layout.querySelector('[data-role="reviewList"]');
      reviews.forEach(r => {
        const card = document.createElement('div');
        card.className = 'review-card';
        card.innerHTML = `
          <div class="review-header">
            <div class="avatar">${(r.author || '?').charAt(0)}</div>
            <div>
              <p class="reviewer"></p>
              <p class="review-meta"></p>
            </div>
          </div>
          <div class="review-stars"></div>
          <p class="review-text"></p>
        `;
        card.querySelector('.reviewer').textContent = r.author || '';
        card.querySelector('.review-meta').textContent = r.date || '';
        card.querySelector('.review-stars').textContent = starString(r.stars);
        card.querySelector('.review-text').textContent = r.text || '';
        reviewListEl.appendChild(card);
      });

      // 静的スライドを使用（Firestore非依存）
      const slides = STATIC_SLIDES;
      let cur = 0;
      const viewerEl = layout.querySelector('[data-role="viewer"]');
      const descEl   = layout.querySelector('[data-role="slideLabel"]');

      function goTo(i) {
        if (!slides.length) return;
        cur = (i + slides.length) % slides.length;
        // 画像を表示
        viewerEl.innerHTML = `<img src="${slides[cur].image}" alt="スクリーンショット ${cur + 1}">`;
        descEl.textContent = slides[cur].description;
      }
      goTo(0);
      layout.querySelector('[data-role="prev"]').addEventListener('click', () => goTo(cur - 1));
      layout.querySelector('[data-role="next"]').addEventListener('click', () => goTo(cur + 1));

      // スワイプ対応
      const screenshotEl = layout.querySelector('.screenshot-main');
      let dragging = false, startX = 0, dragX = 0;
      screenshotEl.addEventListener('pointerdown', (e) => {
        dragging = true; startX = e.clientX; dragX = 0;
        screenshotEl.setPointerCapture(e.pointerId);
      });
      screenshotEl.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        dragX = e.clientX - startX;
      });
      screenshotEl.addEventListener('pointerup', () => {
        if (!dragging) return;
        dragging = false;
        const w = screenshotEl.getBoundingClientRect().width;
        if (dragX > w * 0.2) goTo(cur - 1);
        else if (dragX < -w * 0.2) goTo(cur + 1);
        dragX = 0;
      });
      screenshotEl.addEventListener('pointercancel', () => { dragging = false; dragX = 0; });

    } catch (err) {
      console.error('アプリ詳細の読み込みに失敗しました', err);
      layout.innerHTML = '<p style="text-align:center; color:var(--muted); font-size:13px; padding:80px 20px;">読み込みに失敗しました。時間をおいて再度お試しください。</p>';
    }
  }

  loadApp();
</script>

</body>
</html>
